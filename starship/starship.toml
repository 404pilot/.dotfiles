# ref: https://starship.rs/config/

# prompt order (matches previous spaceship setup)
format = """
$username\
$directory\
$hostname\
$git_branch\
$nodejs\
$ruby\
$python\
$azure\
${custom.azure_label}\
$terraform\
$line_break\
$jobs\
$status\
$sudo\
$character"""

[time]
disabled = true

[directory]
truncation_length = 3

[git_branch]
format = "[$symbol$branch]($style) "

[git_status]
disabled = true

[azure]
disabled = false
format = "[$symbol]($style)"

[custom.azure_label]
when = '[ -n "$AZURE_LABEL" ]'
command = 'echo $AZURE_LABEL'
format = "[$output]($style) "
style = "blue bold"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"
