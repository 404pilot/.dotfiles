# ---------------------------------------------------------------------------
# display
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"          # modern terminal features
set -g allow-passthrough on                      # let apps receive extended keys
set -g extended-keys on                          # CSI u key encoding (shift+enter etc)
set -g base-index 1                              # windows start at 1
setw -g pane-base-index 1                        # panes start at 1
set -g renumber-windows on                       # fill gaps when a window is closed

# ---------------------------------------------------------------------------
# pane borders
# ---------------------------------------------------------------------------
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour45
set -g pane-border-lines heavy

# ---------------------------------------------------------------------------
# status bar
# ---------------------------------------------------------------------------
set -g status-justify centre
set -g status-bg colour58
set -g status-fg white
setw -g window-status-current-style fg=black,bg=white

# ---------------------------------------------------------------------------
# key bindings
# ---------------------------------------------------------------------------

# prompt for name when creating a new window
bind-key c command-prompt -p "window name:" "new-window; rename-window '%%'"

# switch to next pane (zoomed) — one key to toggle between panes
bind-key Tab select-pane -t :.+ \; resize-pane -Z

# vi-style copy mode: v=select, y=yank
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# performance
# ---------------------------------------------------------------------------
set -sg escape-time 1                            # reduce key sequence delay

# ---------------------------------------------------------------------------
# plugins (tpm)
# ref: https://github.com/tmux-plugins/tpm
#
# key bindings:
#   prefix + I        install plugins
#   prefix + Ctrl-s   save session (tmux-resurrect)
#   prefix + Ctrl-r   restore session (tmux-resurrect)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'                   # auto-restore last session on start

# must stay at the bottom — initializes tpm
run '~/.tmux/plugins/tpm/tpm'
